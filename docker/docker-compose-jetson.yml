version: "3.8"
services:
  rfr:
    build:
      context: .
      dockerfile: dockerfile-jetson
    #image: docker_tensorrtforge:latest
    #image: docker_face_recognition:latest
    runtime: nvidia
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/argus_socket:/tmp/argus_socket
      - /dev:/dev
      - ../:/home/user/Documents/rfr
      - ../../../datasets/rfr:/home/user/Documents/rfr/datasets/rfr
      - ../../../models/rfr:/home/user/Documents/rfr/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    ulimits:
      memlock: -1       # CUDA pinned memory icin sinırsız
      stack: 67108864   # 64MB stack
    devices:
      - /dev/nvmap:/dev/nvmap           # Tegra unified memory
      - /dev/nvhost-ctrl:/dev/nvhost-ctrl
      - /dev/nvhost-gpu:/dev/nvhost-gpu
      - /dev/nvhost-as-gpu:/dev/nvhost-as-gpu
      - /dev/nvhost-dbg-gpu:/dev/nvhost-dbg-gpu
    environment:
      - DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - CUDA_VISIBLE_DEVICES=0
      - MALLOC_ARENA_MAX=2              # glibc memory fragmentation azaltir
      #- PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
    shm_size: 16gb
    working_dir: /home/user/Documents/rfr
