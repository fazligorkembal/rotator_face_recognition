version: "3.8"
services:
  rfr:
    build:
      context: .
      dockerfile: dockerfile-jetson
    #image: docker_tensorrtforge:latest
    #image: docker_face_recognition:latest
    runtime: nvidia
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../:/home/user/Documents/rfr
      - ../../../datasets/rfr:/home/user/Documents/rfr/datasets/rfr
      - ../../../models/rfr:/home/user/Documents/rfr/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    privileged: true
    network_mode: host
    environment:
      - DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      #- PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
    shm_size: 16gb
    working_dir: /home/user/Documents/rfr
