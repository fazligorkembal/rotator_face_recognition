<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tactical Surveillance OS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {
                        "surface-container-high": "#2a2a2b",
                        "secondary-fixed-dim": "#ffb3b1",

                        "on-primary": "#003907",
                        "surface-tint": "#00e639",
                        "primary": "#ebffe2",
                        "error": "#ffb4ab",
                        "primary-fixed": "#72ff70",
                        "tertiary-container": "#8ceaff",
                        "inverse-on-surface": "#313031",
                        "on-tertiary-container": "#006a7a",
                        "primary-fixed-dim": "#00e639",
                        "tertiary-fixed": "#a5eeff",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#004e5a",
                        "outline": "#84967e",
                        "inverse-primary": "#006e16",
                        "surface-container-highest": "#353436",
                        "on-surface-variant": "#b9ccb2",
                        "background": "#131314",
                        "secondary-fixed": "#ffdad8",
                        "surface-bright": "#3a393a",
                        "on-primary-fixed": "#002203",
                        "secondary": "#ffb3b1",
                        "on-secondary-fixed": "#410007",
                        "surface-dim": "#131314",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#00daf8",
                        "outline-variant": "#3b4b37",
                        "surface-variant": "#353436",
                        "on-secondary-fixed-variant": "#92001c",
                        "on-background": "#e5e2e3",
                        "secondary-container": "#ff535a",
                        "tertiary": "#eefbff",
                        "surface-container": "#201f20",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#680011",
                        "on-primary-container": "#007117",
                        "on-secondary-container": "#5b000e",
                        "inverse-surface": "#e5e2e3",
                        "on-tertiary-fixed": "#001f25",
                        "surface-container-low": "#1c1b1c",
                        "surface-container-lowest": "#0e0e0f",
                        "on-tertiary": "#00363f",
                        "primary-container": "#00ff41",
                        "surface": "#131314",
                        "on-primary-fixed-variant": "#00530e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1440px",
                        "unit": "4px",
                        "margin": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "telemetry": ["Inter"],
                        "headline-sm": ["Space Grotesk"],
                        "body-fixed": ["Inter"],
                        "display-tech": ["Space Grotesk"],
                        "label-mono": ["Inter"]
                    },
                    "fontSize": {
                        "telemetry": ["12px", { "lineHeight": "1.2", "letterSpacing": "0px", "fontWeight": "500" }],
                        "headline-sm": ["18px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-fixed": ["14px", { "lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "display-tech": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-mono": ["11px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        #video-stage {
            width: min(100%, 1280px, calc((100vh - 260px) * 16 / 9));
        }
    </style>
</head>
<body class="bg-[#050505] text-on-background min-h-screen flex flex-col font-body-fixed text-body-fixed antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 h-12 z-50 bg-[#050505]/80 backdrop-blur-md border-b-px border-[#2D2D30] docked full-width top-0 border-b border-[#2D2D30] flat no shadows">
<div class="text-xl font-black text-[#00FF41] tracking-widest font-['Space_Grotesk'] tracking-tighter uppercase text-xs">
            AEGIS_OS_v4.2
        </div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#00FF41] hover:bg-[#00FF41]/10 hover:text-[#00FF41] transition-colors cursor-pointer p-1 rounded">settings_remote</span>
<span class="material-symbols-outlined text-[#00FF41] hover:bg-[#00FF41]/10 hover:text-[#00FF41] transition-colors cursor-pointer p-1 rounded">sensors</span>
<span class="material-symbols-outlined text-[#00FF41] hover:bg-[#00FF41]/10 hover:text-[#00FF41] transition-colors cursor-pointer p-1 rounded">security</span>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col p-margin gap-margin">
<!-- Video Feed Section -->
<div class="w-full border border-[#2D2D30] bg-[#141416] overflow-hidden flex-shrink-0 rounded p-3">
<div id="video-stage" class="relative mx-auto aspect-video max-w-full overflow-hidden rounded">
<img alt="live browser stream" class="absolute inset-0 h-full w-full object-fill opacity-90" src="{{STREAM_URL}}"/>
<!-- Overlay Grids & HUD -->
<div class="absolute inset-0 border border-primary-container/20 m-4 rounded pointer-events-none"></div>
<div id="detection-overlay" class="absolute inset-0 pointer-events-none"></div>
<div class="absolute bottom-4 left-4 font-label-mono text-label-mono text-primary-container bg-surface-container-lowest/80 px-2 py-1 border border-[#2D2D30]">
                {{SOURCE_MODE}} // <span id="ai-mode">SEARCH</span>
            </div>
<div class="absolute bottom-4 right-4 font-label-mono text-label-mono text-on-surface bg-surface-container-lowest/80 px-2 py-1 border border-[#2D2D30]">
                AI <span id="ai-face-count">0</span> // <span id="ai-latency">0.0</span> MS
            </div>
</div>
</div>
<!-- Horizontal Dashboard -->
<div class="flex flex-col md:flex-row gap-gutter">
<!-- Operational Mode -->
<div class="flex-1 border border-[#2D2D30] bg-[#141416] p-4 relative flex flex-col rounded">
<span class="absolute top-0 left-0 bg-[#2D2D30] text-on-surface font-label-mono text-label-mono px-2 py-0.5 transform -translate-y-1/2 translate-x-2">OPERATIONAL_MODE</span>
<div class="flex gap-4 mt-2 h-full">
<button id="mode-search" class="flex-1 border font-headline-sm text-headline-sm flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined" data-icon="search">search</span>
                        SEARCH
                    </button>
<button id="mode-track" class="flex-1 border font-headline-sm text-headline-sm flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined" data-icon="target">target</span>
                        TRACK
                    </button>
</div>
</div>
<!-- System Metrics -->
<div class="flex-1 border border-[#2D2D30] bg-[#141416] p-4 relative flex flex-col gap-2 rounded">
<span class="absolute top-0 left-0 bg-[#2D2D30] text-on-surface font-label-mono text-label-mono px-2 py-0.5 transform -translate-y-1/2 translate-x-2">SYSTEM_METRICS</span>
<div class="flex flex-col gap-2 mt-2">
<div class="flex justify-between items-center border-b border-[#2D2D30] pb-1">
<span class="font-label-mono text-label-mono text-on-surface-variant">CONFIDENCE</span>
<span class="font-telemetry text-telemetry text-primary-container">{{STATUS_TEXT}}</span>
</div>
<div class="flex justify-between items-center border-b border-[#2D2D30] pb-1">
<span class="font-label-mono text-label-mono text-on-surface-variant">PROCESS_LATENCY</span>
<span class="font-telemetry text-telemetry text-primary-container">BROWSER STREAM</span>
</div>
<div class="flex justify-between items-center">
<span class="font-label-mono text-label-mono text-on-surface-variant">INPUT_SIZE</span>
<span class="font-telemetry text-telemetry text-on-surface">{{FRAME_SIZE}}</span>
</div>
</div>
</div>
<!-- Resource Utilization -->
<div class="flex-[2] border border-[#2D2D30] bg-[#141416] p-4 relative flex flex-col gap-4 rounded">
<span class="absolute top-0 left-0 bg-[#2D2D30] text-on-surface font-label-mono text-label-mono px-2 py-0.5 transform -translate-y-1/2 translate-x-2">RESOURCE_UTILIZATION</span>
<div class="mt-2 flex flex-col gap-3">
<!-- CPU -->
<div>
<div class="flex justify-between mb-1">
<span class="font-label-mono text-label-mono text-on-surface-variant">CPU_UTILIZATION</span>
<span class="font-telemetry text-telemetry text-primary-container">{{SOURCE_MODE}}</span>
</div>
<div class="flex gap-1 h-2">
<div class="flex-1 bg-[#2D2D30] relative overflow-hidden"><div class="absolute inset-y-0 left-0 bg-primary-container w-[80%]"></div></div>
<div class="flex-1 bg-[#2D2D30] relative overflow-hidden"><div class="absolute inset-y-0 left-0 bg-primary-container w-[60%]"></div></div>
<div class="flex-1 bg-[#2D2D30] relative overflow-hidden"><div class="absolute inset-y-0 left-0 bg-primary-container w-[90%]"></div></div>
<div class="flex-1 bg-[#2D2D30] relative overflow-hidden"><div class="absolute inset-y-0 left-0 bg-primary-container w-[40%]"></div></div>
<div class="flex-1 bg-[#2D2D30] relative overflow-hidden"><div class="absolute inset-y-0 left-0 bg-primary-container w-[70%]"></div></div>
<div class="flex-1 bg-[#2D2D30] relative overflow-hidden"><div class="absolute inset-y-0 left-0 bg-primary-container w-[50%]"></div></div>
</div>
</div>
<!-- GPU -->
<div>
<div class="flex justify-between mb-1">
<span class="font-label-mono text-label-mono text-on-surface-variant">GPU_UTILIZATION</span>
<span class="font-telemetry text-telemetry text-error">{{SOURCE_DETAIL}}</span>
</div>
<div class="w-full h-2 bg-[#2D2D30] relative overflow-hidden">
<div class="absolute inset-y-0 left-0 bg-error w-[92%] shadow-[0_0_8px_rgba(255,180,171,0.5)]"></div>
</div>
</div>
</div>
</div>
</div>
</main>
<script>
const overlay = document.getElementById('detection-overlay');
const faceCount = document.getElementById('ai-face-count');
const latency = document.getElementById('ai-latency');
const aiMode = document.getElementById('ai-mode');
const searchModeButton = document.getElementById('mode-search');
const trackModeButton = document.getElementById('mode-track');
let detectionsRequestInFlight = false;

function clampPercent(value) {
    return Math.max(0, Math.min(100, value));
}

function setModeButtonState(button, active) {
    button.style.borderColor = active ? '#00FF41' : '#2D2D30';
    button.style.background = active ? 'rgba(0, 255, 65, 0.20)' : 'transparent';
    button.style.color = active ? '#00FF41' : '#b9ccb2';
    button.style.boxShadow = active ? '0 0 10px rgba(0, 255, 65, 0.20)' : 'none';
}

function renderMode(mode) {
    const normalizedMode = String(mode || 'search').toLowerCase();
    aiMode.textContent = normalizedMode.toUpperCase();
    setModeButtonState(searchModeButton, normalizedMode === 'search');
    setModeButtonState(trackModeButton, normalizedMode === 'track');
}

function renderDetections(data) {
    const width = data.frame_width || 1;
    const height = data.frame_height || 1;
    overlay.replaceChildren();
    faceCount.textContent = String((data.faces || []).length);
    latency.textContent = Number(data.latency_ms || 0).toFixed(1);
    renderMode(data.ai_mode);

    for (const face of data.faces || []) {
        const known = Boolean(face.known);
        const color = known ? '#00FF41' : '#FF535A';
        const fill = known ? 'rgba(0, 255, 65, 0.14)' : 'rgba(255, 83, 90, 0.14)';
        const label = known
            ? `${face.label} ${(Number(face.similarity || 0) * 100).toFixed(0)}%`
            : `DETECTED ${(Number(face.score || 0) * 100).toFixed(0)}%`;

        const box = document.createElement('div');
        const left = clampPercent((Number(face.x1 || 0) / width) * 100);
        const top = clampPercent((Number(face.y1 || 0) / height) * 100);
        const boxWidth = clampPercent(((Number(face.x2 || 0) - Number(face.x1 || 0)) / width) * 100);
        const boxHeight = clampPercent(((Number(face.y2 || 0) - Number(face.y1 || 0)) / height) * 100);

        box.className = 'absolute flex flex-col font-label-mono text-label-mono';
        box.style.left = `${left}%`;
        box.style.top = `${top}%`;
        box.style.width = `${boxWidth}%`;
        box.style.height = `${boxHeight}%`;
        box.style.border = `1px solid ${color}`;
        box.style.background = fill;
        box.style.boxShadow = `0 0 12px ${fill}`;

        const tag = document.createElement('div');
        tag.textContent = label;
        tag.style.color = color;
        tag.style.background = 'rgba(14, 14, 15, 0.82)';
        tag.style.borderRight = `1px solid ${color}`;
        tag.style.borderBottom = `1px solid ${color}`;
        tag.style.padding = '2px 4px';
        tag.style.whiteSpace = 'nowrap';
        tag.style.alignSelf = 'flex-start';
        box.appendChild(tag);
        overlay.appendChild(box);
    }
}

async function pollDetections() {
    if (detectionsRequestInFlight) {
        return;
    }

    detectionsRequestInFlight = true;
    try {
        const response = await fetch('/detections.json', { cache: 'no-store' });
        if (response.ok) {
            renderDetections(await response.json());
        }
    } catch (error) {
        overlay.replaceChildren();
    } finally {
        detectionsRequestInFlight = false;
    }
}

renderMode('search');
pollDetections();
setInterval(pollDetections, 66);
</script>
</body></html>
